<!DOCTYPE html>
<html>
<head>
    <title>Mask Dragons</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; overflow: hidden; width: 100vw; height: 100vh; }
        #canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #hud {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            color: #fff; font-family: 'Segoe UI', sans-serif; font-size: 18px;
            background: rgba(0,0,0,0.5); padding: 6px 18px; border-radius: 20px;
            pointer-events: none; letter-spacing: 1px;
        }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">🌸 Nectar: <span id="score">0</span> &nbsp;|&nbsp; Length: <span id="length">12</span></div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const scoreEl = document.getElementById('score');
const lengthEl = document.getElementById('length');

function setSize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.imageSmoothingEnabled = false;
}
setSize();
window.addEventListener('resize', setSize);

// ── Sprite loader ─────────────────────────────────────────────────────────────
// Each sprite is baked into a tiny offscreen canvas at its NATIVE pixel size.
// Drawing an offscreen canvas onto the main canvas with imageSmoothingEnabled=false
// forces nearest-neighbor interpolation at every scale — crisp pixels guaranteed.
const sprites = {};

function loadSprite(key, src) {
    const img = new Image();
    img.onload = () => {
        const oc  = document.createElement('canvas');
        oc.width  = img.naturalWidth;
        oc.height = img.naturalHeight;
        const ox  = oc.getContext('2d');
        ox.imageSmoothingEnabled = false;
        ox.drawImage(img, 0, 0);
        sprites[key] = oc;
    };
    img.src = src;
}
loadSprite('head', 'head.png');
loadSprite('body', 'body.png');
loadSprite('tail', 'tail.png');

// ── World ─────────────────────────────────────────────────────────────────────
const WORLD = 4000;
const GRID  = 60;

// ── Snake ─────────────────────────────────────────────────────────────────────
const BASE_SIZE    = 48;
const SIZE_PER_EAT = 4;
let   segSize      = BASE_SIZE;
let   gap          = segSize * 0.38;

const NUM_START = 12;
let positions = [];
for (let i = 0; i < NUM_START; i++)
    positions.push({ x: WORLD/2, y: WORLD/2, angle: 0 });

let target = { x: WORLD/2, y: WORLD/2 };

// ── Input ─────────────────────────────────────────────────────────────────────
let mouse = { x: canvas.width/2, y: canvas.height/2 };
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
}, { passive: false });

// ── Nectar ────────────────────────────────────────────────────────────────────
const NECTAR_COUNT = 40;
const NECTAR_R     = 10;
let   nectars      = [];
let   score        = 0;

function spawnNectar() {
    return {
        x: Math.random() * WORLD,
        y: Math.random() * WORLD,
        r: NECTAR_R,
        hue: Math.random() * 360,
        pulse: Math.random() * Math.PI * 2
    };
}
for (let i = 0; i < NECTAR_COUNT; i++) nectars.push(spawnNectar());

function eatNectar() {
    score++;
    scoreEl.textContent = score;
    segSize += SIZE_PER_EAT;
    gap = segSize * 0.38;
    const tail = positions[positions.length - 1];
    positions.push({ x: tail.x, y: tail.y, angle: tail.angle });
    positions.push({ x: tail.x, y: tail.y, angle: tail.angle });
    lengthEl.textContent = positions.length;
}

// ── Camera ────────────────────────────────────────────────────────────────────
function worldToScreen(wx, wy) {
    const head = positions[0];
    return {
        sx: canvas.width/2  + (wx - head.x),
        sy: canvas.height/2 + (wy - head.y)
    };
}

// ── Draw grid ─────────────────────────────────────────────────────────────────
function drawGrid() {
    const head = positions[0];
    const offX = canvas.width/2  - head.x;
    const offY = canvas.height/2 - head.y;
    const startWX = Math.floor(-offX / GRID) * GRID;
    const startWY = Math.floor(-offY / GRID) * GRID;

    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let wx = startWX; wx < -offX + canvas.width + GRID; wx += GRID) {
        const sx = wx + offX;
        ctx.moveTo(sx, 0); ctx.lineTo(sx, canvas.height);
    }
    for (let wy = startWY; wy < -offY + canvas.height + GRID; wy += GRID) {
        const sy = wy + offY;
        ctx.moveTo(0, sy); ctx.lineTo(canvas.width, sy);
    }
    ctx.stroke();

    const tl = worldToScreen(0, 0);
    const br = worldToScreen(WORLD, WORLD);
    ctx.strokeStyle = 'rgba(255,80,80,0.4)';
    ctx.lineWidth = 3;
    ctx.strokeRect(tl.sx, tl.sy, br.sx - tl.sx, br.sy - tl.sy);
}

// ── Draw segment ──────────────────────────────────────────────────────────────
function drawSegment(spriteKey, wx, wy, angle, size) {
    const spr = sprites[spriteKey];
    if (!spr) return;
    const { sx, sy } = worldToScreen(wx, wy);
    const s = Math.round(size);

    ctx.save();
    ctx.translate(Math.round(sx), Math.round(sy));
    ctx.rotate(angle);
    ctx.imageSmoothingEnabled = false;   // re-assert inside save/restore
    ctx.drawImage(spr, -s/2, -s/2, s, s);
    ctx.restore();
}

// ── Draw nectar ───────────────────────────────────────────────────────────────
function drawNectar(n) {
    const { sx, sy } = worldToScreen(n.x, n.y);
    if (sx < -40 || sx > canvas.width+40 || sy < -40 || sy > canvas.height+40) return;
    n.pulse += 0.05;
    const r = n.r + Math.sin(n.pulse) * 3;
    const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, r * 2.5);
    grd.addColorStop(0, `hsla(${n.hue},100%,80%,1)`);
    grd.addColorStop(1, `hsla(${n.hue},100%,50%,0)`);
    ctx.beginPath();
    ctx.arc(sx, sy, r * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${n.hue},100%,75%)`;
    ctx.fill();
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
    const dt = Math.min((ts - lastTime) / 16.67, 3);
    lastTime = ts;

    const cx = canvas.width/2, cy = canvas.height/2;
    const dx = mouse.x - cx, dy = mouse.y - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 5) {
        const speed = 35 * dt;
        target.x = positions[0].x + (dx / dist) * speed;
        target.y = positions[0].y + (dy / dist) * speed;
    }
    target.x = Math.max(0, Math.min(WORLD, target.x));
    target.y = Math.max(0, Math.min(WORLD, target.y));

    positions[0].x += (target.x - positions[0].x) * 0.18 * dt;
    positions[0].y += (target.y - positions[0].y) * 0.18 * dt;

    const hdx = target.x - positions[0].x;
    const hdy = target.y - positions[0].y;
    if (Math.abs(hdx) + Math.abs(hdy) > 0.5)
        positions[0].angle = Math.atan2(hdy, hdx);

    for (let i = 1; i < positions.length; i++) {
        const leader   = positions[i-1];
        const follower = positions[i];
        const fdx = leader.x - follower.x;
        const fdy = leader.y - follower.y;
        const d   = Math.sqrt(fdx*fdx + fdy*fdy);
        const ang = Math.atan2(fdy, fdx);
        if (d > gap) {
            follower.x = leader.x - Math.cos(ang) * gap;
            follower.y = leader.y - Math.sin(ang) * gap;
        }
        follower.angle = ang;
    }

    const head = positions[0];
    const eatR = segSize * 0.5;
    for (let i = nectars.length - 1; i >= 0; i--) {
        const n = nectars[i];
        const edx = head.x - n.x, edy = head.y - n.y;
        if (Math.sqrt(edx*edx + edy*edy) < eatR + n.r) {
            nectars.splice(i, 1);
            eatNectar();
            nectars.push(spawnNectar());
        }
    }

    // ── Draw ──
    ctx.fillStyle = '#141414';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawGrid();
    nectars.forEach(n => drawNectar(n));

    const total = positions.length;
    for (let i = total - 1; i >= 0; i--) {
        const p = positions[i];
        let key, sz;
        if (i === 0)            { key = 'head'; sz = segSize * 1.15; }
        else if (i === total-1) { key = 'tail'; sz = segSize * 0.75; }
        else                    { key = 'body'; sz = segSize; }
        drawSegment(key, p.x, p.y, p.angle, sz);
    }

    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
