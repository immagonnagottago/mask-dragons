<!DOCTYPE html>
<html>
<head>
    <title>Mask Dragons</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; overflow: hidden; width: 100vw; height: 100vh; }
        #canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
        #hud {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            color: #fff; font-family: 'Segoe UI', sans-serif; font-size: 18px;
            background: rgba(0,0,0,0.5); padding: 6px 18px; border-radius: 20px;
            pointer-events: none; letter-spacing: 1px;
        }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">🌸 Nectar: <span id="score">0</span> &nbsp;|&nbsp; Length: <span id="length">12</span></div>
<script>

// ── Canvas setup ──────────────────────────────────────────────────────────────
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d', { alpha: false });
const scoreEl = document.getElementById('score');
const lengthEl= document.getElementById('length');

function setSize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.imageSmoothingEnabled = false;
}
setSize();
window.addEventListener('resize', setSize);

// ── Sprite loader ─────────────────────────────────────────────────────────────
// Bake each PNG into an offscreen canvas at native res.
// Drawing canvas->canvas with imageSmoothingEnabled=false = nearest-neighbor at any scale.
const sprites = {};
function loadSprite(key, src) {
    const img = new Image();
    img.onload = () => {
        const oc = document.createElement('canvas');
        oc.width  = img.naturalWidth;
        oc.height = img.naturalHeight;
        const ox  = oc.getContext('2d');
        ox.imageSmoothingEnabled = false;
        ox.drawImage(img, 0, 0);
        sprites[key] = oc;
    };
    img.src = src;
}
loadSprite('head', 'head.png');
loadSprite('body', 'body.png');
loadSprite('tail', 'tail.png');

// ── Tile loader ───────────────────────────────────────────────────────────────
const TILE_SIZE    = 64;   // world units per tile
const TILE_PX      = 32;   // native pixel size of tile PNGs
const NUM_VARIANTS = 6;
const tileCanvases = [];   // tileCanvases[variant][rotation 0-3]

for (let v = 0; v < NUM_VARIANTS; v++) {
    tileCanvases[v] = [null, null, null, null];
    const img = new Image();
    img.onload = () => {
        for (let r = 0; r < 4; r++) {
            const oc = document.createElement('canvas');
            oc.width = oc.height = TILE_PX;
            const ox = oc.getContext('2d');
            ox.imageSmoothingEnabled = false;
            if (r === 0) {
                ox.drawImage(img, 0, 0, TILE_PX, TILE_PX);
            } else {
                ox.translate(TILE_PX/2, TILE_PX/2);
                ox.rotate(r * Math.PI/2);
                ox.drawImage(img, -TILE_PX/2, -TILE_PX/2, TILE_PX, TILE_PX);
            }
            tileCanvases[v][r] = oc;
        }
    };
    img.src = `tile${v}.png`;
}

// ── Seeded tile map (fixed forever) ──────────────────────────────────────────
function makeRng(seed) {
    return () => {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}
const rng  = makeRng(0xA2C7E3F1);
const COLS = Math.ceil(4000 / TILE_SIZE);
const ROWS = Math.ceil(4000 / TILE_SIZE);
const tileMap = new Uint8Array(COLS * ROWS);
for (let i = 0; i < tileMap.length; i++) {
    const v = Math.floor(rng() * NUM_VARIANTS);
    const r = Math.floor(rng() * 4);
    tileMap[i] = v * 4 + r;
}

// ── World constants ───────────────────────────────────────────────────────────
const WORLD  = 4000;
const SPEED  = 4;     // world units per frame at 60fps

// ── Snake constants ───────────────────────────────────────────────────────────
const BASE_SIZE    = 48;
const SIZE_PER_EAT = 4;
let   segSize      = BASE_SIZE;
let   gap          = segSize * 0.38;

// ── Trail ring buffer ─────────────────────────────────────────────────────────
// Head writes here every frame. Segments read N steps back.
// This is the sole source of truth for body positions.
const MAX_TRAIL = 20000;
const trailX   = new Float32Array(MAX_TRAIL);
const trailY   = new Float32Array(MAX_TRAIL);
const trailA   = new Float32Array(MAX_TRAIL); // angle
let   trailHead = 0;
let   trailFull = false; // true once ring buffer has been written all the way around

// Initialize trail to start position
trailX.fill(WORLD/2);
trailY.fill(WORLD/2);

// ── Snake state ───────────────────────────────────────────────────────────────
const START_SEGS = 12;
let numSegs    = START_SEGS;   // current visible segment count
let targetSegs = START_SEGS;  // target — grows when you eat
let headX = WORLD/2, headY = WORLD/2, headAngle = 0;

// ── Zoom ──────────────────────────────────────────────────────────────────────
const ZOOM_START = 50;
const ZOOM_MIN   = 0.25;
let   zoom       = 1.0;
let   zoomTarget = 1.0;

// ── Input ─────────────────────────────────────────────────────────────────────
let mouseX = canvas.width/2, mouseY = canvas.height/2;
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
}, { passive: false });

// ── Nectar ────────────────────────────────────────────────────────────────────
const NECTAR_COUNT = 40;
let nectars = [];
let score   = 0;

function spawnNectar() {
    return { x: Math.random()*WORLD, y: Math.random()*WORLD,
             r: 10, hue: Math.random()*360, pulse: Math.random()*Math.PI*2 };
}
for (let i = 0; i < NECTAR_COUNT; i++) nectars.push(spawnNectar());

function eatNectar() {
    score++;
    scoreEl.textContent = score;
    segSize += SIZE_PER_EAT;
    gap = segSize * 0.38;
    targetSegs += 2;
    // update zoom target
    if (targetSegs > ZOOM_START) {
        const t = (targetSegs - ZOOM_START) / 300;
        zoomTarget = Math.max(ZOOM_MIN, 1 - t * (1 - ZOOM_MIN));
    }
    lengthEl.textContent = targetSegs;
}

// ── Camera ────────────────────────────────────────────────────────────────────
function worldToScreen(wx, wy) {
    const camX = Math.round(canvas.width/2  - headX * zoom);
    const camY = Math.round(canvas.height/2 - headY * zoom);
    return { sx: camX + Math.round(wx * zoom), sy: camY + Math.round(wy * zoom) };
}

// ── Draw tile floor ───────────────────────────────────────────────────────────
function drawFloor() {
    const scaledTile = TILE_SIZE * zoom;
    const viewLeft = headX - canvas.width  / (2 * zoom);
    const viewTop  = headY - canvas.height / (2 * zoom);
    const colStart = Math.max(0, Math.floor(viewLeft / TILE_SIZE));
    const rowStart = Math.max(0, Math.floor(viewTop  / TILE_SIZE));
    const colEnd   = Math.min(COLS-1, Math.ceil((viewLeft + canvas.width  / zoom) / TILE_SIZE));
    const rowEnd   = Math.min(ROWS-1, Math.ceil((viewTop  + canvas.height / zoom) / TILE_SIZE));

    ctx.imageSmoothingEnabled = false;
    for (let row = rowStart; row <= rowEnd; row++) {
        for (let col = colStart; col <= colEnd; col++) {
            const packed = tileMap[row * COLS + col];
            const tc = tileCanvases[packed >> 2][packed & 3];
            const { sx, sy } = worldToScreen(col * TILE_SIZE, row * TILE_SIZE);
            const w = Math.ceil(scaledTile) + 1;
            if (tc) ctx.drawImage(tc, sx, sy, w, w);
            else { ctx.fillStyle = '#3a3328'; ctx.fillRect(sx, sy, w, w); }
        }
    }

    // World border
    const tl = worldToScreen(0, 0);
    const br = worldToScreen(WORLD, WORLD);
    ctx.strokeStyle = 'rgba(255,80,80,0.5)';
    ctx.lineWidth = 3;
    ctx.strokeRect(tl.sx, tl.sy, br.sx - tl.sx, br.sy - tl.sy);
}

// ── Draw nectar ───────────────────────────────────────────────────────────────
function drawNectar(n) {
    const { sx, sy } = worldToScreen(n.x, n.y);
    if (sx < -40 || sx > canvas.width+40 || sy < -40 || sy > canvas.height+40) return;
    n.pulse += 0.05;
    const r = n.r + Math.sin(n.pulse) * 3;
    const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, r*2.5);
    grd.addColorStop(0, `hsla(${n.hue},100%,80%,1)`);
    grd.addColorStop(1, `hsla(${n.hue},100%,50%,0)`);
    ctx.beginPath(); ctx.arc(sx, sy, r*2.5, 0, Math.PI*2);
    ctx.fillStyle = grd; ctx.fill();
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
    ctx.fillStyle = `hsl(${n.hue},100%,75%)`; ctx.fill();
}

// ── Draw segment ──────────────────────────────────────────────────────────────
function drawSegment(key, wx, wy, angle, size) {
    const spr = sprites[key];
    if (!spr) return;
    const { sx, sy } = worldToScreen(wx, wy);
    const s = Math.round(size * zoom);
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(angle);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(spr, -s/2, -s/2, s, s);
    ctx.restore();
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let lastTs = 0;
function loop(ts) {
    const dt = lastTs === 0 ? 1 : Math.min((ts - lastTs) / 16.67, 1);
    lastTs = ts;

    // Zoom lerp
    zoom += (zoomTarget - zoom) * 0.05;

    // ── Steer head ──
    const cx = canvas.width/2, cy = canvas.height/2;
    const dx = mouseX - cx, dy = mouseY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 5) {
        const desired = Math.atan2(dy, dx);
        const maxTurn = SPEED / (gap * 0.4);
        let delta = desired - headAngle;
        while (delta >  Math.PI) delta -= Math.PI*2;
        while (delta < -Math.PI) delta += Math.PI*2;
        headAngle += Math.max(-maxTurn, Math.min(maxTurn, delta)) * dt;
    }
    headX = Math.max(0, Math.min(WORLD, headX + Math.cos(headAngle) * SPEED * dt));
    headY = Math.max(0, Math.min(WORLD, headY + Math.sin(headAngle) * SPEED * dt));

    // ── Write head to trail ──
    trailHead = (trailHead + 1) % MAX_TRAIL;
    trailX[trailHead] = headX;
    trailY[trailHead] = headY;
    trailA[trailHead] = headAngle;

    // ── Grow one segment per frame if needed ──
    // No positions array — just increment numSegs.
    // The trail already contains the right data; the draw loop reads it directly.
    if (numSegs < targetSegs) numSegs++;

    // ── Nectar collision ──
    const eatR = segSize * 0.5;
    for (let i = nectars.length-1; i >= 0; i--) {
        const n = nectars[i];
        const ex = headX - n.x, ey = headY - n.y;
        if (ex*ex + ey*ey < (eatR + n.r) * (eatR + n.r)) {
            nectars.splice(i, 1);
            eatNectar();
            nectars.push(spawnNectar());
        }
    }

    // ── Draw ──
    ctx.fillStyle = '#141414';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawFloor();
    nectars.forEach(drawNectar);

    // Segments: draw tail→body→head (back to front)
    // Each segment i reads from trail[trailHead - i*sps]
    const sps = Math.max(1, Math.round(gap / SPEED));
    for (let i = numSegs-1; i >= 0; i--) {
        let wx, wy, wa;
        if (i === 0) {
            wx = headX; wy = headY; wa = headAngle;
        } else {
            const idx = ((trailHead - i * sps) % MAX_TRAIL + MAX_TRAIL) % MAX_TRAIL;
            wx = trailX[idx]; wy = trailY[idx]; wa = trailA[idx];
        }
        const key = i === 0 ? 'head' : i === numSegs-1 ? 'tail' : 'body';
        const sz  = i === 0 ? segSize*1.15 : i === numSegs-1 ? segSize*0.75 : segSize;
        drawSegment(key, wx, wy, wa, sz);
    }

    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

</script>
</body>
</html>
