<!DOCTYPE html>
<html>
<head>
    <title>Modular Snake</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #arena { width: 600px; height: 600px; background: #222; border: 3px solid #444; position: relative; overflow: hidden; cursor: crosshair; }
        .segment { 
            position: absolute; 
            width: 64px; height: 64px; /* Adjust this to your Piskel size */
            background-size: contain; 
            background-repeat: no-repeat;
            transform-origin: center; 
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="arena"></div>
    <script>
        const arena = document.getElementById('arena');
        
        // --- THE SNAKE LIBRARY ---
        // Just change the "currentSkin" name to swap snakes!
        const skins = {
            "dragon": { head: 'head.png', body: 'body.png', tail: 'tail.png', length: 10, gap: 20 },
            "forest": { head: 'f_head.png', body: 'f_body.png', tail: 'f_tail.png', length: 15, gap: 15 },
            "lava":   { head: 'l_head.png', body: 'l_body.png', tail: 'l_tail.png', length: 8, gap: 25 }
        };

        const currentSkin = skins["dragon"]; // Change "dragon" to "forest" to swap!

        const segments = [];
        const positions = [];
        const total = currentSkin.length + 2; 

        // Initialize based on the chosen skin
        for (let i = 0; i < total; i++) {
            const el = document.createElement('div');
            el.className = 'segment';
            
            if (i === 0) el.style.backgroundImage = `url('${currentSkin.head}')`;
            else if (i === total - 1) el.style.backgroundImage = `url('${currentSkin.tail}')`;
            else el.style.backgroundImage = `url('${currentSkin.body}')`;
            
            el.style.zIndex = total - i;
            arena.appendChild(el);
            segments.push(el);
            positions.push({ x: 300, y: 300, angle: 0 });
        }

        let mouse = { x: 300, y: 300 };
        arena.addEventListener('mousemove', (e) => {
            const rect = arena.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        function update() {
            const hdx = mouse.x - positions[0].x;
            const hdy = mouse.y - positions[0].y;
            if (Math.abs(hdx) > 1 || Math.abs(hdy) > 1) {
                positions[0].angle = Math.atan2(hdy, hdx);
            }
            positions[0].x += hdx * 0.15;
            positions[0].y += hdy * 0.15;

            for (let i = 1; i < total; i++) {
                const leader = positions[i - 1];
                const follower = positions[i];
                const dx = leader.x - follower.x;
                const dy = leader.y - follower.y;
                const angle = Math.atan2(dy, dx);
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > currentSkin.gap) {
                    follower.x = leader.x - Math.cos(angle) * currentSkin.gap;
                    follower.y = leader.y - Math.sin(angle) * currentSkin.gap;
                    follower.angle = angle;
                }
            }

            segments.forEach((seg, i) => {
                const p = positions[i];
                seg.style.left = p.x + 'px';
                seg.style.top = p.y + 'px';
                seg.style.transform = `translate(-50%, -50%) rotate(${p.angle}rad)`;
            });
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
