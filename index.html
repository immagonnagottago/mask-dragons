<!DOCTYPE html>
<html>
<head>
    <title>Mask Dragons</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; overflow: hidden; width: 100vw; height: 100vh; }
        #canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #hud {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            color: #fff; font-family: 'Segoe UI', sans-serif; font-size: 18px;
            background: rgba(0,0,0,0.5); padding: 6px 18px; border-radius: 20px;
            pointer-events: none; letter-spacing: 1px;
        }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">🌸 Nectar: <span id="score">0</span> &nbsp;|&nbsp; Length: <span id="length">12</span></div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const scoreEl = document.getElementById('score');
const lengthEl = document.getElementById('length');

function setSize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.imageSmoothingEnabled = false;
}
setSize();
window.addEventListener('resize', setSize);

// ── Sprite loader ─────────────────────────────────────────────────────────────
// Each sprite is baked into a tiny offscreen canvas at its NATIVE pixel size.
// Drawing an offscreen canvas onto the main canvas with imageSmoothingEnabled=false
// forces nearest-neighbor interpolation at every scale — crisp pixels guaranteed.
const sprites = {};

function loadSprite(key, src) {
    const img = new Image();
    img.onload = () => {
        const oc  = document.createElement('canvas');
        oc.width  = img.naturalWidth;
        oc.height = img.naturalHeight;
        const ox  = oc.getContext('2d');
        ox.imageSmoothingEnabled = false;
        ox.drawImage(img, 0, 0);
        sprites[key] = oc;
    };
    img.src = src;
}
loadSprite('head', 'head.png');
loadSprite('body', 'body.png');
loadSprite('tail', 'tail.png');

// ── World ─────────────────────────────────────────────────────────────────────
const WORLD = 4000;
const GRID  = 60;

// ── Snake ─────────────────────────────────────────────────────────────────────
const BASE_SIZE    = 48;
const SIZE_PER_EAT = 4;
let   segSize      = BASE_SIZE;
let   gap          = segSize * 0.38;

// ── Zoom ─────────────────────────────────────────────────────────────────────
const ZOOM_START_LENGTH = 50;   // length at which zoom-out begins
const ZOOM_MIN          = 0.25; // how far it can zoom out max
let   zoom              = 1.0;  // current zoom (1 = normal, <1 = zoomed out)
let   targetZoom        = 1.0;

const NUM_START = 12;

// ── Trail-based movement ──────────────────────────────────────────────────────
// Instead of a physics chain, we record every point the head passes through.
// Each body segment reads its position from `gap` steps back in that history.
// This means the whole snake travels the exact same path as the head —
// segments never lag, loops can't close, and movement feels like classic snake.
const trail = [];  // ring buffer of {x, y, angle} head positions
let trailHead = 0; // index of most recent entry
const MAX_TRAIL = 20000;
for (let i = 0; i < MAX_TRAIL; i++) trail.push({ x: WORLD/2, y: WORLD/2, angle: 0 });

let numSegments = NUM_START; // total segment count (grows on eat)
let tailDebt = 0; // extra samples to hold the tail back by (drains 1/frame)
// positions array still used for drawing — filled from trail each frame
let positions = [];
for (let i = 0; i < numSegments; i++)
    positions.push({ x: WORLD/2, y: WORLD/2, angle: 0 });

// ── Input ─────────────────────────────────────────────────────────────────────
let mouse = { x: canvas.width/2, y: canvas.height/2 };
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
}, { passive: false });

// ── Nectar ────────────────────────────────────────────────────────────────────
const NECTAR_COUNT = 40;
const NECTAR_R     = 10;
let   nectars      = [];
let   score        = 0;

function spawnNectar() {
    return {
        x: Math.random() * WORLD,
        y: Math.random() * WORLD,
        r: NECTAR_R,
        hue: Math.random() * 360,
        pulse: Math.random() * Math.PI * 2
    };
}
for (let i = 0; i < NECTAR_COUNT; i++) nectars.push(spawnNectar());

function eatNectar() {
    score++;
    scoreEl.textContent = score;
    segSize += SIZE_PER_EAT;
    gap = segSize * 0.38;
    // Add segments immediately; hold tail back by 2 segment-lengths worth of samples
    const sps = Math.max(1, Math.round(gap / SPEED));
    tailDebt += 2 * sps;
    positions.push({ x: 0, y: 0, angle: 0 });
    positions.push({ x: 0, y: 0, angle: 0 });
    numSegments += 2;
    lengthEl.textContent = numSegments + pendingGrowth;
    // Zoom out proportionally past ZOOM_START_LENGTH
    const len = positions.length;
    if (len > ZOOM_START_LENGTH) {
        const t = (len - ZOOM_START_LENGTH) / 300; // fully zoomed at ~350 length
        targetZoom = Math.max(ZOOM_MIN, 1 - t * (1 - ZOOM_MIN));
    }
}

// ── Camera ────────────────────────────────────────────────────────────────────
function worldToScreen(wx, wy) {
    const head = positions[0]; // head is always positions[0]
    // Snap camera origin to whole pixels — tiles always land on exact boundaries, no jitter
    const camX = Math.round(canvas.width/2  - head.x * zoom);
    const camY = Math.round(canvas.height/2 - head.y * zoom);
    return {
        sx: camX + Math.round(wx * zoom),
        sy: camY + Math.round(wy * zoom)
    };
}

// ── Seeded RNG (mulberry32) ───────────────────────────────────────────────────
// Same seed = identical arena every single load, forever.
function makeRng(seed) {
    return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}
const TILE_SEED = 0xA2C7E3F1; // fixed forever
const tileRng   = makeRng(TILE_SEED);

// ── Stone tile variants ───────────────────────────────────────────────────────
// Each tile is a 16×16 offscreen canvas drawn once at startup.
// We stamp them tiled across the world — seeded per-cell choice + rotation.
const TILE_SIZE = 64; // world units per tile (matches GRID)
const TILE_PX   = 32; // pixel resolution of each tile canvas

// ── Load your tile PNGs and bake rotations ───────────────────────────────────
const NUM_VARIANTS = 6;
const tileCanvases = [];
let tilesLoaded = 0;

for (let v = 0; v < NUM_VARIANTS; v++) {
    tileCanvases[v] = new Array(4).fill(null);
    const img = new Image();
    img.onload = () => {
        for (let r = 0; r < 4; r++) {
            const oc = document.createElement('canvas');
            oc.width = oc.height = TILE_PX;
            const ox = oc.getContext('2d');
            ox.imageSmoothingEnabled = false;
            if (r === 0) {
                ox.drawImage(img, 0, 0, TILE_PX, TILE_PX);
            } else {
                ox.translate(TILE_PX/2, TILE_PX/2);
                ox.rotate(r * Math.PI/2);
                ox.drawImage(img, -TILE_PX/2, -TILE_PX/2, TILE_PX, TILE_PX);
            }
            tileCanvases[v][r] = oc;
        }
        tilesLoaded++;
    };
    img.src = `tile${v}.png`;
}

// ── Per-cell tile assignment (seeded, fixed forever) ─────────────────────────
const COLS = Math.ceil(WORLD / TILE_SIZE);
const ROWS = Math.ceil(WORLD / TILE_SIZE);
const tileMap = new Uint8Array(COLS * ROWS); // packed: variant*4 + rotation
for (let i = 0; i < tileMap.length; i++) {
    const v = Math.floor(tileRng() * NUM_VARIANTS);
    const r = Math.floor(tileRng() * 4);
    tileMap[i] = v * 4 + r;
}

// ── Draw arena ────────────────────────────────────────────────────────────────
function drawGrid() {
    const head = positions[0];
    const scaledTile = TILE_SIZE * zoom;

    // World pixel of top-left screen corner
    const viewLeft = head.x - canvas.width  / (2 * zoom);
    const viewTop  = head.y - canvas.height / (2 * zoom);

    // First tile col/row visible
    const colStart = Math.max(0, Math.floor(viewLeft / TILE_SIZE));
    const rowStart = Math.max(0, Math.floor(viewTop  / TILE_SIZE));
    const colEnd   = Math.min(COLS-1, Math.ceil((viewLeft + canvas.width  / zoom) / TILE_SIZE));
    const rowEnd   = Math.min(ROWS-1, Math.ceil((viewTop  + canvas.height / zoom) / TILE_SIZE));

    for (let row = rowStart; row <= rowEnd; row++) {
        for (let col = colStart; col <= colEnd; col++) {
            const packed = tileMap[row * COLS + col];
            const v = Math.floor(packed / 4);
            const r = packed % 4;
            const tc = tileCanvases[v][r];
            const { sx, sy } = worldToScreen(col * TILE_SIZE, row * TILE_SIZE);
            ctx.imageSmoothingEnabled = false;
            if (tc) {
                ctx.drawImage(tc, Math.floor(sx), Math.floor(sy),
                              Math.ceil(scaledTile) + 1, Math.ceil(scaledTile) + 1);
            } else {
                // Tile not loaded yet — fill with dark stone colour
                ctx.fillStyle = '#3a3328';
                ctx.fillRect(Math.floor(sx), Math.floor(sy),
                             Math.ceil(scaledTile) + 1, Math.ceil(scaledTile) + 1);
            }
        }
    }

    // World border
    const tl = worldToScreen(0, 0);
    const br = worldToScreen(WORLD, WORLD);
    ctx.strokeStyle = 'rgba(255,80,80,0.4)';
    ctx.lineWidth = 3;
    ctx.strokeRect(tl.sx, tl.sy, br.sx - tl.sx, br.sy - tl.sy);
}

// ── Draw segment ──────────────────────────────────────────────────────────────
function drawSegment(spriteKey, wx, wy, angle, size) {
    const spr = sprites[spriteKey];
    if (!spr) return;
    const { sx, sy } = worldToScreen(wx, wy);
    const s = Math.round(size * zoom);

    ctx.save();
    ctx.translate(Math.round(sx), Math.round(sy));
    ctx.rotate(angle);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(spr, -s/2, -s/2, s, s);
    ctx.restore();
}

// ── Draw nectar ───────────────────────────────────────────────────────────────
function drawNectar(n) {
    const { sx, sy } = worldToScreen(n.x, n.y);
    if (sx < -40 || sx > canvas.width+40 || sy < -40 || sy > canvas.height+40) return;
    n.pulse += 0.05;
    const r = n.r + Math.sin(n.pulse) * 3;
    const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, r * 2.5);
    grd.addColorStop(0, `hsla(${n.hue},100%,80%,1)`);
    grd.addColorStop(1, `hsla(${n.hue},100%,50%,0)`);
    ctx.beginPath();
    ctx.arc(sx, sy, r * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${n.hue},100%,75%)`;
    ctx.fill();
}

// ── Main loop ─────────────────────────────────────────────────────────────────
const SPEED = 4; // world units per frame at 60fps
let lastTime = 0;
function loop(ts) {
    // Hard-cap dt to 1 frame — prevents snake teleporting after tab switches or GC pauses
    const dt = lastTime === 0 ? 1 : Math.min((ts - lastTime) / 16.67, 1);
    lastTime = ts;

    // Smoothly lerp zoom toward target
    zoom += (targetZoom - zoom) * 0.05;

    // ── Move head ──
    const cx = canvas.width/2, cy = canvas.height/2;
    const dx = mouse.x - cx, dy = mouse.y - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 5) {
        // Desired angle toward mouse
        const desiredAngle = Math.atan2(dy, dx);

        // Tightest loop radius = 1.5× gap (just wider than snake body in world units)
        // maxTurn = SPEED / turnRadius — scales with size automatically via gap
        const turnRadius = gap * 0.4;
        const maxTurn = SPEED / turnRadius; // fixed per frame, not dt-scaled

        // Shortest angular delta (handles 180° wrap)
        let delta = desiredAngle - positions[0].angle;
        while (delta >  Math.PI) delta -= Math.PI * 2;
        while (delta < -Math.PI) delta += Math.PI * 2;

        // Clamp turn to max
        positions[0].angle += Math.max(-maxTurn, Math.min(maxTurn, delta));

        // Move forward in current facing direction
        positions[0].x += Math.cos(positions[0].angle) * SPEED * dt;
        positions[0].y += Math.sin(positions[0].angle) * SPEED * dt;
    }
    positions[0].x = Math.max(0, Math.min(WORLD, positions[0].x));
    positions[0].y = Math.max(0, Math.min(WORLD, positions[0].y));

    // ── Record head into trail ring buffer ──
    trailHead = (trailHead + 1) % MAX_TRAIL;
    trail[trailHead].x     = positions[0].x;
    trail[trailHead].y     = positions[0].y;
    trail[trailHead].angle = positions[0].angle;

    const SAMPLES_PER_SEG = Math.max(1, Math.round(gap / SPEED));

    // ── Place each segment at its fixed distance back along the trail ──
    // tailDebt offsets every segment's trail lookup equally, holding the whole
    // tail end back. It drains 1 per frame so the tail catches up gradually.
    for (let i = 1; i < numSegments; i++) {
        const debt = i >= numSegments - 2 ? tailDebt : 0;
        const idx = ((trailHead - i * SAMPLES_PER_SEG - debt) % MAX_TRAIL + MAX_TRAIL) % MAX_TRAIL;
        positions[i].x     = trail[idx].x;
        positions[i].y     = trail[idx].y;
        positions[i].angle = trail[idx].angle;
    }
    if (tailDebt > 0) tailDebt--;

    const head = positions[0]; // head is always positions[0]
    const eatR = segSize * 0.5;
    for (let i = nectars.length - 1; i >= 0; i--) {
        const n = nectars[i];
        const edx = head.x - n.x, edy = head.y - n.y;
        if (Math.sqrt(edx*edx + edy*edy) < eatR + n.r) {
            nectars.splice(i, 1);
            eatNectar();
            nectars.push(spawnNectar());
        }
    }

    // ── Draw ──
    ctx.fillStyle = '#141414';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawGrid();
    nectars.forEach(n => drawNectar(n));

    const total = numSegments;
    for (let i = total - 1; i >= 0; i--) {
        const p = positions[i];
        let key, sz;
        if (i === 0)            { key = 'head'; sz = segSize * 1.15; }
        else if (i === total-1) { key = 'tail'; sz = segSize * 0.75; }
        else                    { key = 'body'; sz = segSize; }
        drawSegment(key, p.x, p.y, p.angle, sz);
    }

    requestAnimationFrame(safeLoop);
}

function safeLoop(ts) {
    try { loop(ts); } catch(e) { console.error(e); requestAnimationFrame(safeLoop); }
}
requestAnimationFrame(safeLoop);
</script>
</body>
</html>
